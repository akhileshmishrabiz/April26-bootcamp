# ClamAV freshclam config for Ubuntu 22.04 container
# Paths match apt package defaults on ubuntu:22.04

DatabaseOwner clamav
UpdateLogFile /var/log/clamav/freshclam.log
LogVerbose false
LogSyslog false
LogFacility LOG_LOCAL6
LogFileMaxSize 0
LogRotate true
LogTime true
Foreground false
Debug false
MaxAttempts 5
DatabaseDirectory /var/lib/clamav
DNSDatabaseInfo current.cvd.clamav.net
ConnectTimeout 30
ReceiveTimeout 60
TestDatabases yes
ScriptedUpdates yes
CompressLocalDatabase no
Bytecode true
CVDCertsDirectory /etc/clamav/certs
FIPSCryptoHashLimits yes

# Scanner uses clamscan directly; clamd is not started in this container.
# NotifyClamd /etc/clamav/clamd.conf

Checks 24
DatabaseMirror database.clamav.net
